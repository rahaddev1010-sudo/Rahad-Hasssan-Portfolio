<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
  </defs>
  <!-- Professional circular base with a vibrant blue-indigo gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#brandGradient)" />
  <!-- Clean, bold Monogram "RH" with improved centering and weight -->
  <text x="50%" y="52%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="220" fill="#ffffff" text-anchor="middle" dominant-baseline="central">RH</text>
  <!-- Small accent dot for a polished, modern finish -->
  <circle cx="256" cy="410" r="12" fill="#ffffff" />
</svg>
